<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>my-blog</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" id="hljs-theme-light" href="vendor/hljs-light.min.css" />
  <link rel="stylesheet" id="hljs-theme-dark" href="vendor/hljs-dark.min.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="index.html">my<span class="dot">-</span>blog</a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환">🌙</button>
    </div>
  </header>

  <main class="container">
    <a class="back-link" href="index.html">← 목록으로</a>

    <article>
      <header class="post-header">
        <h1 id="post-title" class="post-card-title">불러오는 중...</h1>
        <div id="post-meta" class="post-meta"></div>
        <div id="post-tags" class="post-tags"></div>
      </header>
      <div id="post-content" class="post-content"></div>
      <div class="post-actions">
        <button id="edit-btn" type="button" class="btn btn-secondary">✏️ 수정</button>
        <button id="delete-btn" type="button" class="btn btn-danger">🗑 삭제</button>
      </div>
      <p id="action-status" class="form-status"></p>
    </article>
  </main>

  <div id="password-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <h2 class="modal-title">비밀번호 확인</h2>
      <form id="password-modal-form">
        <input
          id="password-modal-input"
          class="text-input"
          type="password"
          autocomplete="current-password"
          placeholder="비밀번호를 입력하세요"
        />
        <div class="modal-actions">
          <button type="button" id="password-modal-cancel" class="btn btn-secondary">취소</button>
          <button type="submit" id="password-modal-confirm" class="btn btn-primary">확인</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">© 2026 my-blog</div>
  </footer>

  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/render.js"></script>
  <script src="js/post.js"></script>
</body>
</html>
