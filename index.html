<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>my-blog</title>
  <meta name="description" content="마크다운으로 쓴 글을 모아둔 블로그" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" id="hljs-theme-light" href="vendor/hljs-light.min.css" />
  <link rel="stylesheet" id="hljs-theme-dark" href="vendor/hljs-dark.min.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="index.html">my<span class="dot">-</span>blog</a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환">🌙</button>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">글 목록</h1>
    <p class="page-subtitle">마크다운으로 쓴 글을 모아뒀어요.</p>

    <div class="controls">
      <input
        id="search-input"
        class="search-input"
        type="search"
        placeholder="제목, 태그, 내용으로 검색"
      />
      <div id="tag-filters" class="tag-filters"></div>
    </div>

    <ul id="post-list" class="post-list"></ul>
    <p id="empty-state" class="empty-state" hidden>조건에 맞는 글이 없어요.</p>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 my-blog</div>
  </footer>

  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/render.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
